<div id="satellite-view" class="draggable-window resizable-window auto-hide-header visible">
    <div class="window-wrapper">
        <div class="window-header">
            <span class="window-title"><i class="material-icons">map</i><span>VLEO View</span></span>
            <a class="btn light-glass" data-action="close" data-toggle="tooltip" title="Close">
                <i class="material-icons">close</i>
            </a>
        </div>
        <div class="window-content">
            <canvas id="satellite-view-canvas" width="200" height="200"></canvas>
        </div>
    </div>
</div>
