<div class="draggable-window resizable-window auto-hide-header visible">
    <div class="window-wrapper">
        <div class="window-header">
            <span class="window-title"><i class="material-icons">map</i><span>VLEO View</span></span>
            <a class="btn light-glass" data-action="close" data-toggle="tooltip" title="Close">
                <i class="material-icons">close</i>
            </a>
        </div>
        <div class="window-content">
            <canvas class="satellite-view-canvas" width="320" height="320"></canvas>

            <div class="satellite-view-controls container-fluid satellite-view-controls">
                <div class="row">
                    <div class="col-12">
                        <a class="btn glass block px-3" onclick="CosmoScout.satellites._resetObserver(); CosmoScout.satellites._resetDate(); CosmoScout.satellites._fetchImage(); ">
                            Sync Render Server
                        </a>
                    </div>
                </div>

                <div class="row">
                    <div class="col-6">
                        Field of View
                    </div>
                    <div class="col-6">
                        <div class="satellite-view-fov"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
