<div class="strike">
    <span>Add a new Satellite</span>
</div>

<div class="row">
    <div class="col-5">
        Satellite
    </div>
    <div class="col-7">
        <select data-callback="satellites.setSatellite" data-container="#cosmoscout" data-width="100%"
                class="simple-value-dropdown">
            <!-- Filled by JavaScript Function -->
            <option value="0">Create New</option>
        </select>
    </div>
</div>

<div class="row">
    <div class="col-5">
        Model
    </div>
    <div class="col-7">
        <select data-callback="satellites.setSatelliteModel" data-container="#cosmoscout" data-width="100%"
                class="simple-value-dropdown">
            <option value="../share/resources/models/VLEO_centered.glb">Default</option>
            <option value="../share/resources/models/VLEO_alt.glb">With Camera</option>
            <option value="../share/resources/models/IdeatoOrbit-rev01.glb">1x Cube</option>
            <option value="../share/resources/models/IdeatoOrbit-rev01_double.glb">2x Cube</option>
        </select>
    </div>
</div>

<!-- Name -->
<div class="row">
    <div class="col-5">
        Name
    </div>
    <div class="col-7">
        <input type="text" placeholder="Satellite Name" class="form-control" id="satellite-add-name" />
    </div>
</div>

<!-- Duration -->
<div class="row">
    <div class="col-6">
        <div class="input-group">
            <input type="text" placeholder="Start Date" class="form-control" id="satellite-add-start-date">
            <div class="input-group-append">
                <button class="btn glass fix-rounded-right" type="button" data-toggle="tooltip"
                        title="Use current time">
                    <i class="material-icons">update</i>
                </button>
            </div>
            <div class="invalid-feedback"></div>
        </div>
    </div>
    <div class="col-6">
        <div class="input-group">
            <input type="text" placeholder="End Date" class="form-control" id="satellite-add-end-date">
            <div class="input-group-append">
                <button class="btn glass fix-rounded-right" type="button" data-toggle="tooltip"
                        title="Use current time">
                    <i class="material-icons">update</i>
                </button>
            </div>
            <div class="invalid-feedback"></div>
        </div>
    </div>
</div>

<!-- Semi-major axis -->
<div class="row">
    <div class="col-5">
        Semi-Major Axis
    </div>
    <div class="col-7">
        <input type="number" placeholder="SMA" class="form-control" id="satellite-add-sma" value="6733" />
    </div>
</div>
<!-- Eccentricity -->
<div class="row">
    <div class="col-5">
        Eccentricity
    </div>
    <div class="col-7">
        <input type="number" placeholder="ECC" class="form-control" id="satellite-add-ecc" value="0.03190221275591707" />
    </div>
</div>
<!-- Inclination -->
<div class="row">
    <div class="col-5">
        Inclination
    </div>
    <div class="col-7">
        <input type="number" placeholder="INC" class="form-control" id="satellite-add-inc" value="90.00014746268153" />
    </div>
</div>
<!-- Right ascension of the ascending node -->
<div class="row">
    <div class="col-5">
        Right Ascension of the Ascending Node
    </div>
    <div class="col-7">
        <input type="number" placeholder="RAAN" class="form-control" id="satellite-add-raan" value="0.004" />
    </div>
</div>
<!-- Argument of periapsis -->
<div class="row">
    <div class="col-5">
        Argument of Periapsis
    </div>
    <div class="col-7">
        <input type="number" placeholder="AOP" class="form-control" id="satellite-add-aop" value="270" />
    </div>
</div>
<!-- ? -->
<div class="row">
    <div class="col-5">
        M
    </div>
    <div class="col-7">
        <input type="number" placeholder="M" class="form-control" id="satellite-add-m" value="0" />
    </div>
</div>

<div class="row">
    <div class="col-12">
        <a class="btn glass block px-3" onclick="CosmoScout.satellites._requestSatellite()">
            Request new Satellite kernels
        </a>
    </div>
</div>
